<html lang="en">
<head>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Default Light Mode Styles */
            background-color: #f3f4f6;
            color: #333;
            transition: background-color 600ms ease, color 400ms ease;
        }

        /* Dark Mode Styles */
        body.dark {
            background-color: #1a202c; /* Dark background */
            color: #e2e8f0; /* Light text */
        }

        .dark .bg-white { background-color: #2d3748 !important; } /* Darker cards */
        .dark .text-gray-800 { color: #e2e8f0 !important; }
        .dark .text-gray-700 { color: #cbd5e0 !important; }
        .dark .text-gray-500 { color: #a0aec0 !important; }
        .dark .border-gray-200 { border-color: #4a5568 !important; }
        .dark .battle-log.bg-emerald-100 { background-color: #4a5568 !important; border-color: #636b77 !important; color: #cbd5e0 !important;}
        .dark .item-selected { border-color: #0d9488; box-shadow: 0 0 0 3px #0d9488;} /* Darker emerald for selected items in dark mode */
        .dark .hp-bar-container { background-color: #4a5568; border-color: #718096; }
        .dark .hp-bar-container::before { background-image: repeating-linear-gradient(to right, transparent, transparent calc(10% - 1px), #718096 calc(10% - 1px), #718096 10%); }


        .hit {
            animation: hitAnim 0.5s ease;
        }

        @keyframes hitAnim {
            0% { transform: translateX(0) scale(1); }
            25% { transform: translateX(-10px) scale(1.02); }
            50% { transform: translateX(10px) scale(1.02); }
            75% { transform: translateX(-10px) scale(1.02); }
            100% { transform: translateX(0) scale(1); }
        }

        /* Mega hit shake and brief red flash */
        .mega-hit {
            animation: megaHitShake 0.6s ease;
        }
        @keyframes megaHitShake {
            0% { transform: translateX(0) scale(1); filter: saturate(1); }
            10% { transform: translateX(-14px) scale(1.03); }
            20% { transform: translateX(14px) scale(1.03); }
            30% { transform: translateX(-12px) scale(1.02); }
            40% { transform: translateX(12px) scale(1.02); }
            50% { transform: translateX(-8px) scale(1.01); }
            60% { transform: translateX(8px) scale(1.01); }
            70% { transform: translateX(-4px) scale(1.005); }
            80% { transform: translateX(4px) scale(1.005); }
            100% { transform: translateX(0) scale(1); }
        }
        .mega-flash {
            animation: megaFlash 450ms ease-in-out;
        }
        @keyframes megaFlash {
            0% { box-shadow: 0 0 0 rgba(239,68,68,0); border-color: rgba(239,68,68,0); }
            20% { box-shadow: 0 0 18px rgba(239,68,68,0.9); border-color: #ef4444; }
            60% { box-shadow: 0 0 10px rgba(239,68,68,0.6); border-color: #ef4444; }
            100% { box-shadow: 0 0 0 rgba(239,68,68,0); }
        }


        /* Style for selected items */
        .item-selected {
            border-color: #10B981; /* Emerald green */
            box-shadow: 0 0 0 3px #10B981; /* Green ring */
        }
        
        /* Style for items selected by both players */
        .item-selected-both {
            border-color: #8B5CF6; /* Purple */
            box-shadow: 0 0 0 3px #8B5CF6; /* Purple ring */
        }

        /* Gradient for buttons */
        .btn-gradient-blue { background-image: linear-gradient(to right, #3B82F6, #2563EB); }
        .btn-gradient-blue:hover { background-image: linear-gradient(to right, #2563EB, #1D4ED8); }

        .btn-gradient-emerald { background-image: linear-gradient(to right, #10B981, #059669); }
        .btn-gradient-emerald:hover { background-image: linear-gradient(to right, #059669, #047857); }

        .btn-gradient-gray { background-image: linear-gradient(to right, #6B7280, #4B5563); }
        .btn-gradient-gray:hover { background-image: linear-gradient(to right, #4B5563, #374151); }

        .btn-gradient-yellow { background-image: linear-gradient(to right, #F59E0B, #D97706); }
        .btn-gradient-yellow:hover { background-image: linear-gradient(to right, #D97706, #B45309); }

        .btn-gradient-purple { background-image: linear-gradient(to right, #9333ea, #7e22ce); }
        .btn-gradient-purple:hover { background-image: linear-gradient(to right, #7e22ce, #6b21a8); }

        /* Added for Campaign UI */
        .btn-gradient-green { background-image: linear-gradient(to right, #22C55E, #16A34A); }
        .btn-gradient-green:hover { background-image: linear-gradient(to right, #16A34A, #15803D); }
        .btn-gradient-red { background-image: linear-gradient(to right, #EF4444, #DC2626); }
        .btn-gradient-red:hover { background-image: linear-gradient(to right, #DC2626, #B91C1C); }


        /* New: Red tint for defeated player profiles */
        .loser-tint {
            filter: brightness(70%) grayscale(50%);
            border-color: #EF4444; /* Red border */
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.7); /* Red glow */
        }

        /* Overlay alternative so buttons can stay bright above it (no tint now) */
        .loser-overlay {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: transparent;
            box-shadow: none;
            pointer-events: none;
        }

        /* Blur + dim effect used on P2 panel while mode overlay is visible */
        .panel-blur-dim {
            filter: blur(5px) brightness(0.6);
            transition: filter 150ms ease-in-out;
        }

        /* Smooth color transitions for fighter panels and headings */
        .fighter {
            transition: background-color 600ms ease, border-color 600ms ease, color 400ms ease;
        }
        #player1Name, #player2Name {
            transition: color 600ms ease;
        }

        /* Stronger shadow/card for mode selector */
        .mode-overlay-card {
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
        }

        /* New: Purple tint for poisoned players */
        .poison-tint {
            /* filter: hue-rotate(270deg) saturate(1.5) brightness(0.9); */ /* REMOVED TINT */
            border-color: #8B5CF6; /* Purple border */
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.7); /* Purple glow */
        }

        /* New: White flash for dodges */
        @keyframes dodgeFlashAnim {
            0% { filter: brightness(1) drop-shadow(0 0 0 rgba(255,255,255,0)); }
            50% { filter: brightness(2) drop-shadow(0 0 15px rgba(255,255,255,0.7)); }
            100% { filter: brightness(1) drop-shadow(0 0 0 rgba(255,255,255,0)); }
        }
        .dodge-flash {
            animation: dodgeFlashAnim 0.3s ease-out; /* Quick pop and fade */
        }

        /* New: Blue flash for stun */
        @keyframes stunFlashAnim {
            0% { filter: brightness(1) drop-shadow(0 0 0 rgba(0,191,255,0)); }
            50% { filter: brightness(1.5) drop-shadow(0 0 15px rgba(0,191,255,0.7)); }
            100% { filter: brightness(1) drop-shadow(0 0 0 rgba(0,191,255,0)); }
        }
        .stun-flash {
            animation: stunFlashAnim 0.3s ease-out; /* Quick pop and fade */
        }

        /* Invulnerable golden border */
        .invulnerable-glow {
            border-color: #f59e0b !important; /* amber-500 */
            box-shadow: 0 0 20px 4px rgba(103, 194, 255, 0.8) !important;
        }


        /* Floating text for damage/healing */
        .floating-text {
            position: absolute;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: floatUpFade 2.0s forwards; /* Increased duration */
            z-index: 10;
            white-space: nowrap; /* Prevent text wrapping */
            font-size: 1.8rem; /* Default size */
            will-change: transform, opacity;
        }

        .floating-text.damage { 
            color: #dc2626; /* Red */
            font-size: 1.25rem; /* Match HP text size */
            /* Fast impact drop; fade starts after 0.1s */
            animation: impactDrop 0.5s ease-out forwards, delayedFade 0.5s linear 0.08s forwards;
        }
        .floating-text.critical {
            color: #f59e0b; /* Orange */
            font-size: 2.5rem; /* Enlarge critical hit numbers */
            /* Stronger impact drop; fade starts after 0.1s */
            animation: impactDropCrit 0.6s ease-out forwards, delayedFade 0.6s linear 0.08s forwards;
            transform-origin: center;
        }
        /* Extra-large, long-lasting red text for special big hits (Meteor, D20) */
        .gargoyle-glow {
            box-shadow: 0 0 12px 4px rgba(156, 163, 175, 0.75);
        }
        .floating-text.mega {
            color: #b91c1c; /* Red-700 */
            font-size: 3.2rem;
            font-weight: 900;
            animation: floatUpFade 3.4s forwards; /* Longer duration */
        }
        .floating-text.heal { color: #10b981; font-size: 1.25rem; animation: floatUpFast 1.2s ease-out forwards, delayedFade 1.1s linear 0.1s forwards; } /* Green */
        .floating-text.poison { color: #8b5cf6; font-size: 1.25rem; animation: floatDownFast 1.2s ease-out forwards, delayedFade 1.1s linear 0.1s forwards; } /* Purple */
        .floating-text.burn { color: #f43f5e; font-size: 1.25rem; animation: floatDownFast 1.2s ease-out forwards, delayedFade 1.1s linear 0.1s forwards; } /* Rose-500 */
        .floating-text.thorns { color: #6b7280; animation: floatUpFast 1.2s ease-out forwards, delayedFade 1.1s linear 0.1s forwards; } /* Gray */
        .floating-text.thorns { color: #6b7280; animation: floatUpFade 2.6s forwards; } /* Gray, longer */


        @keyframes floatUpFade {
            0% { transform: translateY(0px) translateX(-50%); opacity: 1; }
            100% { transform: translateY(-90px) translateX(-50%); opacity: 0; } /* Increased float distance */
        }

        /* New: Springy arc for damage numbers that jump out from HP bar's right edge and fall down */
        /* Fast impact pop for damage */
        @keyframes impactDrop {
            0% { transform: translate(0, 0) scale(0.7); }
            20% { transform: translate(0, 10px) scale(1.25, 0.85); }
            45% { transform: translate(0, 18px) scale(0.95, 1.1); }
            70% { transform: translate(0, 26px) scale(1.02, 0.98); }
            100% { transform: translate(0, 36px) scale(1); }
        }

        /* Stronger impact for crits */
        @keyframes impactDropCrit {
            0% { transform: translate(0, 0) scale(0.6); }
            22% { transform: translate(0, 14px) scale(1.35, 0.8); }
            44% { transform: translate(0, 26px) scale(0.9, 1.15); }
            70% { transform: translate(0, 38px) scale(1.05, 0.97); }
            100% { transform: translate(0, 52px) scale(1.02); }
        }

        /* Opacity fades after a 0.5s delay (handled via animation delay in rules above) */
        @keyframes delayedFade {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Remove corkscrew/glint: crit uses stronger impactPopCrit above */

        /* Fast straight float up for non-damage types */
        @keyframes floatUpFast {
            0% { transform: translateY(0) translateX(-50%) scale(0.9); }
            50% { transform: translateY(-40px) translateX(-50%) scale(1.0); }
            100% { transform: translateY(-70px) translateX(-50%) scale(0.98); }
        }
        /* Fast straight float down for non-damage types */
        @keyframes floatDownFast {
            0% { transform: translateY(0) translateX(-50%) scale(0.9); }
            50% { transform: translateY(40px) translateX(-50%) scale(1.0); }
            100% { transform: translateY(70px) translateX(-50%) scale(0.98); }
        }

        /* Stat highlight animations */
        .stat-highlight {
            transition: background-color 0.3s ease-in-out, color 0.3s ease-in-out;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .stat-increase {
            background-color: rgba(16, 185, 129, 0.3); /* Emerald green translucent */
            color: #059669; /* Darker green text */
        }

        .dark .stat-increase {
            background-color: rgba(16, 185, 129, 0.5);
            color: #a7f3d0;
        }

        .stat-decrease {
            background-color: rgba(239, 68, 68, 0.3); /* Red translucent */
            color: #dc2626; /* Darker red text */
        }

        .dark .stat-decrease {
            background-color: rgba(239, 68, 68, 0.5);
            color: #fca5a5;
        }

        /* Modal specific styles */
        .modal-content {
            max-height: 80vh; /* Limit height to prevent overflow on small screens */
            overflow-y: auto; /* Enable scrolling for modal content */
        }
        
        /* HP Bar Styles */
        .hp-bar-container {
            width: 80%;
            height: 14px; /* THINNER HP BAR */
            background-color: #e5e7eb;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }
        .hp-bar-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: repeating-linear-gradient(to right, transparent, transparent calc(10% - 1px), #d1d5db calc(10% - 1px), #d1d5db 10%);
            z-index: 1;
        }

        .hp-bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.5s ease-in-out, background-color 0.5s ease-in-out;
            position: relative;
            z-index: 2;
        }

        .hp-high { background-color: #22c55e; } /* Green */
        .hp-mid { background-color: #f59e0b; } /* Amber */
        .hp-low { background-color: #ef4444; } /* Red */
        .hp-poisoned { background-color: #9333ea; } /* Purple-600 */
        .dark .hp-poisoned { background-color: #a855f7; } /* Purple-500 */
        .hp-burned { background-color: #f43f5e; } /* Rose-500 (orange-red) */
        .dark .hp-burned { background-color: #fb7185; } /* Rose-400 */
        
        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s, transform 0.3s;
        }
        #toast.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -10px);
        }
        #toast.success { background-color: #22c55e; }
        #toast.error { background-color: #ef4444; }

        // Helper for floating text
        function showFloatingText(parentId, value, typeClass) {
            const parent = document.getElementById(parentId);
            if (!parent) return;

            const textEl = document.createElement('div');
            textEl.classList.add('floating-text', typeClass);

            let displayValue;
            if (typeClass === 'heal') {
                displayValue = `+${Math.abs(value)}💚`;
            } else if (typeClass === 'critical') {
                displayValue = `-${Math.abs(value)}!💥`;
            } else if (typeClass === 'thorns') {
                displayValue = `-${Math.abs(value)}🌵`;
            } else if (typeClass === 'burn') {
                displayValue = `-${Math.abs(value)}🔥`;
            } else { // 'damage', 'poison'
                displayValue = `-${Math.abs(value)}💔`;
            }
            textEl.innerText = displayValue;

            // Positioning: all numbers originate from the center of the HP bar
            const hpBar = parent.querySelector('.hp-bar-container');
            const parentRect = parent.getBoundingClientRect();
            const isDamageLike = (typeClass === 'damage' || typeClass === 'critical');
            const isHpTextAnchored = (typeClass === 'heal' || typeClass === 'poison' || typeClass === 'burn' || isDamageLike);
            let originX, originY;
            if (isHpTextAnchored) {
                const m = (parentId || '').match(/(\d+)/);
                const num = m ? m[1] : '';
                const hpEl = document.getElementById(`hp${num}`);
                if (hpEl && parentRect) {
                    const r = hpEl.getBoundingClientRect();
                    originX = r.left + (r.width / 2) - parentRect.left;
                    originY = r.top + (r.height / 2) - parentRect.top;
                }
            }
            if ((typeof originX === 'undefined' || typeof originY === 'undefined') && hpBar && parentRect) {
                const barRect = hpBar.getBoundingClientRect();
                originX = barRect.left + (barRect.width * (isDamageLike ? 0.75 : 0.5)) - parentRect.left;
                originY = barRect.top + (barRect.height / 2) - parentRect.top;
            }
            if (typeof originX === 'undefined' || typeof originY === 'undefined') {
                // Fallback: approximate using parent width/height
                const pr = parent.getBoundingClientRect();
                originX = pr.left + pr.width * (isDamageLike ? 0.75 : 0.5) - pr.left;
                originY = pr.top + (pr.height / 2) - pr.top;
            }
            const stackOffset = parent.querySelectorAll('.floating-text').length * 6; // light stacking
            const offsetY = 20;
            textEl.style.left = `${originX}px`;
            textEl.style.top = `${originY - offsetY + stackOffset}px`;
            textEl.style.transform = 'translateX(-50%)';
            parent.appendChild(textEl);

            textEl.addEventListener('animationend', () => {
                textEl.remove();
            });
        }

        // Quick number tween for HP display (uses previous value explicitly)
        function animateNumber(element, startValue, endValue, duration = 260) {
            if (!element) return;
            if (!Number.isFinite(startValue)) startValue = 0;
            if (!Number.isFinite(endValue) || startValue === endValue) {
                element.textContent = String(Math.round(endValue));
                return;
            }
            if (element._hpAnimRaf) cancelAnimationFrame(element._hpAnimRaf);
            const startTime = performance.now();
            const totalChange = endValue - startValue;
            const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
            const step = (now) => {
                const elapsed = now - startTime;
                const t = Math.min(1, elapsed / duration);
                const eased = easeOutCubic(t);
                const valueNow = Math.round(startValue + totalChange * eased);
                element.textContent = String(valueNow);
                if (t < 1) {
                    element._hpAnimRaf = requestAnimationFrame(step);
                } else {
                    element.textContent = String(Math.round(endValue));
                    element._hpAnimRaf = null;
                }
            };
            element._hpAnimRaf = requestAnimationFrame(step);
        }

        // Tag items into categories based on stats (not placement)
        function tagItemsByCurrentPosition() {
            const miscItemNames = new Set(['Rocket Salvo','D20','Hidden Dagger','3/4 Metronome','Lucky Coin','Meteor Talisman']);
            const isHealItem = (it) => (
                (it.hpRegenPerTurn && it.hpRegenPerTurn > 0) || it.doubleRegen ||
                (it.regenOnCritOrDodge && it.regenOnCritOrDodge > 0) ||
                (it.regenPerCurrentHpPercent && it.regenPerCurrentHpPercent > 0) ||
                (it.regenPerMaxHpPercent && it.regenPerMaxHpPercent > 0) ||
                it.tripleRegenNextTurnOnCrit || it.defSpdRegDoubleNextTurnOnCrit ||
                (it.reviveThreshold && it.reviveThreshold > 0)
            );
            const isDefItem = (it) => (
                (it.def && it.def > 0) || (it.defBonusPercent && it.defBonusPercent > 0) ||
                (it.damageReduction && it.damageReduction > 0) ||
                (it.reflectBlockedDamage && it.reflectBlockedDamage > 0) ||
                (it.thornsDamage && it.thornsDamage > 0) || it.immuneToCrits || it.reflectDotPercent
            );
            const isDodgeItem = (it) => (
                (it.dodgeChance && it.dodgeChance > 0) || (it.dodgeBuffPerTurn && it.dodgeBuffPerTurn > 0) || it.auraStone || it.antiqueFanDmgOnDodge || it.poisonOnDodgeAmount
            );
            const isSpeedItem = (it) => (
                (it.spd && it.spd !== 0) || (it.spdPerTurn && it.spdPerTurn > 0) || it.spdFromDef || it.spdFromCrit || it.gearShiftSpdPerTurn
            );
            itemsList.forEach((item) => {
                if (miscItemNames.has(item.name)) {
                    item.category = 'MISC';
                    return;
                }
                let category = 'ATK'; // default
                if (isHealItem(item)) category = 'HEAL';
                else if (isDefItem(item)) category = 'DEF';
                else if (isDodgeItem(item)) category = 'DODGE';
                else if (isSpeedItem(item)) category = 'SPEED';
                // Explicit overrides
                if (item.comboFinisher || item.cosmicSoap) category = 'MISC';
                if (item.name === "Sniper's Bow") category = 'ATK';
                if (item.name === 'Gale Cloak') category = 'DODGE';
                if (item.name === "Arcanist's Wand") category = 'HEAL';
                if (item.name === 'Steel Blade') category = 'ATK';
                if (item.name === 'Bonebreaker Mace') category = 'ATK';
                if (item.name === 'Keyblade') category = 'ATK';
                if (item.name === 'Jade Scimitar') category = 'ATK';
                if (item.name === 'Berserker Helm') category = 'DEF';
                if (item.name === 'Great Shield') category = 'DEF';
                if (item.name === 'Spiked Shield') category = 'DEF';
                if (item.name === 'Prism Core') category = 'DEF';
                if (item.name === 'Soulblood Ampule') category = 'DEF';
                if (item.name === 'Gargoyle Necklace') category = 'DEF';
                if (item.name === 'Gilded Coin') category = 'DODGE';
                if (item.name === 'Rocket Salvo') category = 'MISC';
                if (item.name === 'Keyblade') category = 'ATK';
                if (item.name === 'Bouncing Disc') category = 'ATK';
                if (item.name === 'Hacksaw') category = 'ATK';
                if (item.name === 'Winning Ticket') category = 'ATK';
                if (item.name === 'Echo Shell') category = 'DEF';
                if (item.name === 'Aura Stone') category = 'MISC';
                if (item.name === 'Laced Fan') category = 'DODGE';
                if (item.name === 'Gear Shift') category = 'SPEED';
                if (item.name === 'Imperial Crest') category = 'HEAL';
                if (item.name === 'Antibodies') category = 'HEAL';
                if (item.name === 'Heavy Hammer') category = 'ATK';
                if (item.name === 'Fairy Ring') category = 'HEAL';
                if (item.name === 'Venom Stim') category = 'HEAL';
                if (item.name === 'Dragonscale Heart') category = 'HEAL';
                if (item.name === 'Mystic Band') category = 'HEAL';
                if (item.name === 'Serene Mala') category = 'ATK';
                if (item.name === 'Ruby Pendant') category = 'HEAL';
                // MISC category overrides
                if (item.name === 'D20') category = 'MISC';
                if (item.name === 'Hidden Dagger') category = 'MISC';
                if (item.name === '3/4 Metronome') category = 'MISC';
                if (item.name === 'Lucky Coin') category = 'MISC';
                if (item.name === 'Meteor Talisman') category = 'MISC';
                item.category = category;
            });
        }

        function addItem(index) {
            if (mode === 'campaign') {
                // Disable equipping items from main library during Campaign
                showToast('Item selection is disabled in Campaign mode.', 'error');
                return;
            }
            const selectedItem = itemsList[index];
            const itemButton = document.getElementById(`item-btn-${index}`);
            
            // Check if item is already selected by either player
            const isSelectedByP1 = p1.inv.some(item => item.name === selectedItem.name);
            const isSelectedByP2 = p2.inv.some(item => item.name === selectedItem.name);

            if (isSelectedByP1 && isSelectedByP2) {
                // If both players have it, remove it from both
                p1.inv = p1.inv.filter(item => item.name !== selectedItem.name);
                p2.inv = p2.inv.filter(item => item.name !== selectedItem.name);
                updateStats(p1, 1);
                updateStats(p2, 2);
                log(`Both players dropped ${selectedItem.name}`);
                itemButton.classList.remove('item-selected');
            } else if (isSelectedByP1) {
                // If only P1 has it, try to add it to P2
                if (p2.inv.length < MAX_ITEMS_PER_PLAYER) {
                    p2.inv.push(selectedItem);
                    updateStats(p2, 2);
                    log(`${p2Name} picked up ${selectedItem.name}`);
                    itemButton.classList.add('item-selected');
                } else {
                    log(`${p2Name} has a full inventory!`);
                }
            } else if (isSelectedByP2) {
                // If only P2 has it, try to add it to P1
                if (p1.inv.length < MAX_ITEMS_PER_PLAYER) {
                    p1.inv.push(selectedItem);
                    updateStats(p1, 1);
                    log(`${p1Name} picked up ${selectedItem.name}`);
                    itemButton.classList.add('item-selected');
                } else {
                    log(`${p1Name} has a full inventory!`);
                }
            } else {
                // If not selected by either player, add it to the first available player
                if (p1.inv.length < MAX_ITEMS_PER_PLAYER) {
                    p1.inv.push(selectedItem);
                    updateStats(p1, 1);
                    log(`${p1Name} picked up ${selectedItem.name}`);
                    itemButton.classList.add('item-selected');
                } else if (p2.inv.length < MAX_ITEMS_PER_PLAYER) {
                    p2.inv.push(selectedItem);
                    updateStats(p2, 2);
                    log(`${p2Name} picked up ${selectedItem.name}`);
                    itemButton.classList.add('item-selected');
                } else {
                    log('Both players have full inventories!');
                }
            }
        }
        function randomizeItems(playerNum) {
            if (mode === 'campaign') {
                showToast('Randomize is disabled in Campaign mode.', 'error');
                return;
            }
            let player = playerNum === 1 ? p1 : p2;
            let playerName = playerNum === 1 ? p1Name : p2Name;

            // First, remove this player's items from the selection state
            player.inv.forEach(item => {
                const originalIndex = itemsList.findIndex(i => i.name === item.name);
                const btn = document.getElementById(`item-btn-${originalIndex}`);
                if (btn) btn.classList.remove('item-selected');
            });

            player.inv = [];
            
            // Create a list of items not currently held by the OTHER player
            const otherPlayerInv = (playerNum === 1 ? p2 : p1).inv.map(i => i.name);
            let availableItems = itemsList.filter(item => !otherPlayerInv.includes(item.name) && !item.shelved);
            
            let shuffledItems = availableItems.sort(() => 0.5 - Math.random());

            for (let i = 0; i < MAX_ITEMS_PER_PLAYER; i++) {
                if (shuffledItems.length > 0) {
                    const item = shuffledItems.shift();
                    player.inv.push(item);
                    const originalIndex = itemsList.findIndex(i => i.name === item.name);
                    const btn = document.getElementById(`item-btn-${originalIndex}`);
                    if (btn) btn.classList.add('item-selected');
                }
            }
            updateStats(player, playerNum);
            log(`${playerName} randomized items: ${player.inv.map(i => i.name).join(', ')}`);
        }

            const logDiv = document.getElementById('log');

            else if (message.includes('attacks')) colorClass = 'text-red-700 dark:text-red-400';
            else if (message.includes('Critical Hit!')) colorClass = 'text-orange-600 dark:text-orange-400 font-bold';
            else if (message.includes('gains') || message.includes('reduces') || message.includes('loses')) colorClass = 'text-blue-700 dark:text-blue-400';
            else if (message.includes('poisoned') || message.includes('poison damage')) colorClass = 'text-purple-700 dark:text-purple-400';
            else if (message.includes('dodges')) colorClass = 'text-gray-500 dark:text-gray-400';
            else if (message.includes('lifesteals')) colorClass = 'text-red-500 dark:text-red-400';
            else if (message.includes('stunned')) colorClass = 'text-cyan-700 dark:text-cyan-400';
            
            const boldedMessage = message.replace(/\b(regens|attacks|poisoned|poison damage|dodges|lifesteals|heals|stunned)\b/g, '<b>$1</b>');

            logDiv.innerHTML += `<p class="mb-1 ${colorClass}">${boldedMessage}</p>`;
            fullBattleLogContent += `${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function getEncounterNamesForFloor(f) {
            if (floorEncounters && Array.isArray(floorEncounters[f])) return floorEncounters[f];
            // Fallback: rotate through library for any floor up to MAX_CAMPAIGN_FLOOR
            const names = monsterLibrary.map(m => m.name);
            const start = (f - 1) % names.length;
            return [0,1,2].map(i => names[(start + i) % names.length]);
        }

        function clearLoserVisuals() {
            ['1','2'].forEach(n => {
                const f = document.getElementById(`fighter${n}`);
                if (f) f.classList.remove('loser-tint');

                if (ov) ov.remove();
            });
        }

            if (item.useDefAsAtk) itemStatSpans.push(`<span class="${getStatColorClass('ATK/SPD')}">Use <b>DEF</b> as ATK</span>`);
            if (item.defBonusPercent) itemStatSpans.push(`<span class="${getStatColorClass('DEF %')}"><b>+${(item.defBonusPercent * 100).toFixed(0)}%</b>DEF</span>`);
            if (item.itemHpBonus) itemStatSpans.push(`<span class="${getStatColorClass('HP')}"><b>${item.itemHpBonus > 0 ? '+' : ''}${item.itemHpBonus}</b>HP</span>`);
            if (item.name !== 'Fairy Ring' && item.spd) itemStatSpans.push(`<span class="${getStatColorClass('SPD')}"><b>${item.spd > 0 ? '+' : ''}${item.spd}</b>SPD</span>`);
            if (item.critChance) itemStatSpans.push(`<span class="${getStatColorClass('CRIT')}"><b>+${(item.critChance * 100).toFixed(0)}</b>%<span class='text-orange-400'>CRIT</span></span>`);

        function offerItems() {
            // Generate up to 3 random items not already in P1 inventory with DISTINCT categories
            const available = itemsList.filter(i => !p1.inv.some(pi => pi.name === i.name) && !i.shelved);
            // Group by category
            const byCat = available.reduce((acc, item) => {
                const cat = item.category || 'MISC';
                if (!acc[cat]) acc[cat] = [];
                acc[cat].push(item);
                return acc;
            }, {});
            const cats = Object.keys(byCat);
            // Randomize category order
            cats.sort(() => 0.5 - Math.random());
            const offers = [];
            const usedNames = new Set();
            for (const cat of cats) {
                if (offers.length >= 3) break;
                const pool = byCat[cat];
                if (!pool || pool.length === 0) continue;
                // pick random item from this category not already chosen
                const shuffledPool = pool.slice().sort(() => 0.5 - Math.random());
                const pick = shuffledPool.find(it => !usedNames.has(it.name));
                if (pick) {
                    offers.push(pick);
                    usedNames.add(pick.name);
                }
            }
            // Fallback: if we couldn't reach 3 due to limited categories, pad with any remaining items (rare)
            if (offers.length < 3) {
                const fillPool = available.filter(it => !usedNames.has(it.name));
                fillPool.sort(() => 0.5 - Math.random());
                while (offers.length < 3 && fillPool.length > 0) {
                    offers.push(fillPool.shift());
                }
            }
            // Remember this set so we can reopen the same choices if needed
            currentItemOffers = offers.slice();
            // Build simple modal
            const modalId = 'campaignOfferModal';
            let modal = document.getElementById(modalId);
            if (!modal) {
                modal = document.createElement('div');
                modal.id = modalId;
                modal.className = 'fixed inset-0 bg-gray-600 bg-opacity-75 flex items-center justify-center z-50';
                modal.innerHTML = '<div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-xl max-w-xl w-full"></div>';
                document.body.appendChild(modal);
            }
            const content = modal.firstElementChild;
            const renderItemLine = (item) => {
                const parts = [];
                if (item.atk) parts.push(`ATK +${item.atk}`);
                if (item.def) parts.push(`DEF +${item.def}`);
                if (item.spd) parts.push(`SPD +${item.spd}`);
                if (item.itemHpBonus) parts.push(`HP +${item.itemHpBonus}`);
                return `${item.emoji || ''} <b>${item.name}</b> <span class="text-sm text-gray-600">${parts.join(', ')}</span>`;
            };
            const offerButtons = offers.map((item, idx) => {
                const tooltip = getItemTooltipHTML(item);
                const label = `<b>${item.emoji || ''} ${item.name}</b><br>${tooltip}`;
                return `<button data-offer-idx="${idx}" class="w-full text-left bg-gray-700 hover:bg-gray-600 text-white py-3 px-4 rounded-xl mb-2 whitespace-normal break-words"><div class="space-y-1 leading-snug">${label}</div></button>`;
            }).join('');
            const skipBtn = `<button id="offerSkip" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded-xl mt-1">Skip</button>`;
            content.innerHTML = `
                <h3 class="text-xl font-bold mb-3 text-gray-800 dark:text-gray-100">Choose a reward</h3>
                ${offerButtons}
                ${skipBtn}
            `;
            // Wire handlers
            content.querySelectorAll('button[data-offer-idx]').forEach(btn => {
                btn.onclick = () => {
                    const idx = parseInt(btn.getAttribute('data-offer-idx'));
                    // Let the selection flow decide when to close the offer modal
                    handleOfferSelect(currentItemOffers[idx], modal);
                };
            });
            content.querySelector('#offerSkip').onclick = () => {
                modal.remove();
            };
        }

        function offerMonsters() {
            // Determine encounter pool for this floor (fallback to library)
            const poolNames = getEncounterNamesForFloor(floor);
            const offers = poolNames.map(n => monsterLibrary.find(m => m.name === n)).filter(Boolean);

            const modalId = 'campaignMonsterModal';
            let modal = document.getElementById(modalId);
            if (!modal) {
                modal = document.createElement('div');
                modal.id = modalId;
                modal.className = 'fixed inset-0 bg-gray-600 bg-opacity-75 flex items-center justify-center z-50';
                modal.innerHTML = '<div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-xl max-w-xl w-full"></div>';
                document.body.appendChild(modal);
            }
            const content = modal.firstElementChild;
            // Auto-pick a random monster from all 5 for this floor
            const pick = offers[Math.floor(Math.random() * offers.length)];
            setCurrentMonster(pick);
            // Remove/hide modal immediately if present
            modal.remove();
        }

        function chooseRandomMonsterForFloor() {
            const poolNames = getEncounterNamesForFloor(floor);
            let offers = poolNames.map(n => monsterLibrary.find(m => m.name === n)).filter(Boolean);
            // Filter out shelved monster items when converting to inventory later (handled in setCurrentMonster)
            if (!offers || offers.length === 0) {
                // Fallback: any monster from library to avoid dead-end
                offers = monsterLibrary.slice(0, 5);
            }
            const pick = offers[Math.floor(Math.random() * offers.length)];
            setCurrentMonster(pick);
        }
        function setCurrentMonster(mon) {
            if (!mon) return;
            currentMonster = JSON.parse(JSON.stringify(mon));
            p2.baseHp = currentMonster.hp;
            p2.baseAtk = currentMonster.atk;
            p2.baseDef = currentMonster.def;
            p2.baseSpd = currentMonster.spd;
            p2.currentHp = currentMonster.hp;
            // Give monster up to 4 item slots based on its definition
            p2.inv = [];
            const desiredItemNames = [];
            if (Array.isArray(currentMonster.items)) desiredItemNames.push(...currentMonster.items);
            if (Array.isArray(currentMonster.item)) desiredItemNames.push(...currentMonster.item);
            else if (typeof currentMonster.item === 'string') desiredItemNames.push(currentMonster.item);
            const seen = new Set();
            for (const name of desiredItemNames) {
                const key = String(name || '').toLowerCase();
                if (!key || seen.has(key)) continue;
                const it = itemsList.find(i => i.name.toLowerCase() === key && !i.shelved);
                if (it) {
                    p2.inv.push(it);
                    seen.add(key);
                    if (p2.inv.length >= MAX_ITEMS_PER_PLAYER) break;
                }
            }
            p2Name = currentMonster.name;
            updateStats(p2, 2);
            // Override emoji on P2 name if monster provides one
            if (currentMonster.emoji) {
                const el = document.getElementById('player2Name');
                if (el) el.innerHTML = `${p2Name} ${currentMonster.emoji}`;
            }
            p2.currentHp = p2.maxHp;
            updateStats(p2, 2);
            const fightBtn = document.getElementById('fightButton');
            if (fightBtn) fightBtn.disabled = false;
        }

        function handleOfferSelect(item, offerModalEl = null) {
            if (p1.inv.length < MAX_ITEMS_PER_PLAYER) {
                p1.inv.push(item);
                updateStats(p1, 1);
                log(`${p1Name} acquired ${item.name}`);
                if (offerModalEl) offerModalEl.remove();
            } else {
                // Replacement prompt
                const modalId = 'campaignReplaceModal';
                let modal = document.getElementById(modalId);
                if (!modal) {
                    modal = document.createElement('div');
                    modal.id = modalId;
                    modal.className = 'fixed inset-0 bg-gray-600 bg-opacity-75 flex items-center justify-center z-50';
                    modal.innerHTML = '<div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-xl max-w-xl w-full"></div>';
                    document.body.appendChild(modal);
                }
                const content = modal.firstElementChild;
                const invButtons = p1.inv.map((invItem, idx) => `
                    <button data-replace-idx="${idx}" class="w-full text-left bg-gray-700 hover:bg-gray-600 text-white py-2 px-4 rounded-xl mb-2">Replace: ${invItem.emoji || ''} <b>${invItem.name}</b></button>
                `).join('');
                const cancelBtn = `<button id="replaceCancel" class="w-full bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 px-4 rounded-xl mt-1">Cancel</button>`;
                content.innerHTML = `
                    <h3 class="text-xl font-bold mb-3 text-gray-800 dark:text-gray-100">Inventory full. Choose an item to replace</h3>
                    ${invButtons}
                    ${cancelBtn}
                `;
                content.querySelectorAll('button[data-replace-idx]').forEach(btn => {
                    btn.onclick = () => {
                        const idx = parseInt(btn.getAttribute('data-replace-idx'));
                        p1.inv.splice(idx, 1);
                        p1.inv.push(item);
                        updateStats(p1, 1);
                        log(`${p1Name} replaced an item with ${item.name}`);
                        modal.remove();
                        // After replacement, proceed to the next fight in Campaign mode
                        if (offerModalEl) offerModalEl.remove();
                        if (mode === 'campaign') {
                            // Auto-start fight
                            startFight();
                        }
                    };
                });
                content.querySelector('#replaceCancel').onclick = () => {
                    modal.remove();
                    // Re-open the same offers so the player can choose again
                    reopenCurrentOfferModal();
                };
            }
        }

        function startFight() {
            if (mode === 'campaign') {
                clearLoserVisuals();
                // Ensure P2 stats match currentMonster
                if (!currentMonster) loadMonsterForFloor();
                p2.baseHp = currentMonster.hp;
                p2.baseAtk = currentMonster.atk;
                p2.baseDef = currentMonster.def;
                p2.baseSpd = currentMonster.spd;
                p2.currentHp = currentMonster.hp;
                // Reapply up to 4 item slots (robust to string or array forms)
                p2.inv = [];
                const desiredItemNames = [];
                if (Array.isArray(currentMonster.items)) desiredItemNames.push(...currentMonster.items);
                if (Array.isArray(currentMonster.item)) desiredItemNames.push(...currentMonster.item);
                else if (typeof currentMonster.item === 'string') desiredItemNames.push(currentMonster.item);
                const seen = new Set();
                for (const rawName of desiredItemNames) {
                    const key = String(rawName || '').toLowerCase();
                    if (!key || seen.has(key)) continue;
                    const it = itemsList.find(i => i.name.toLowerCase() === key);
                    if (it) {
                        p2.inv.push(it);
                        seen.add(key);
                        if (p2.inv.length >= MAX_ITEMS_PER_PLAYER) break;
                    }
                }
                updateStats(p2, 2);
                // Force full heal to new Max HP before battle clones
                p2.currentHp = p2.maxHp;
                updateStats(p2, 2);
                // Hide next floor until after victory
                // nextFloor button removed from panel; overlay handles proceed action
                const fightBtn = document.getElementById('fightButton');
                if (fightBtn) fightBtn.disabled = true;
                if (fightBtn) fightBtn.style.display = 'none';
            }
            startBattle();
        }
        let isAdvancingFloor = false;

            if (milestone) milestone.remove();
            floor += 1;
            document.getElementById('floorNumber').innerText = String(floor);
            chooseRandomMonsterForFloor();
            if (floor >= 11) {

                const buffId = 'campaignTempBuffModal';
                let modal = document.getElementById(buffId);
                if (!modal) {

                    modal.className = 'fixed inset-0 bg-gray-600 bg-opacity-75 flex items-center justify-center z-50';

        async function executeAttack(attacker, defender, attNum, defNum, isDoubleAttack = false) {

            const attackerFighterId = `fighter${attNum}`;
