                attacker.stunnedTurns = 1;
                log(`${attackerName} is stunned by Volatile Fuse! 🧨`);
                return;
            }

            // Blade Shoes: first two hits guaranteed CRIT (once per attack, total of 2 for the entire battle)
            if (!isDoubleAttack && attacker.firstTwoHitsCrit && !attacker._bladeShoesAppliedThisAttack) {
                attacker._forcedCritNextAttack = true;
                attacker._bladeShoesAppliedThisAttack = true;
                attacker._firstTwoHitsCritCount = (attacker._firstTwoHitsCritCount || 0) + 1;
                if (attacker._firstTwoHitsCritCount >= 2) {
                    attacker.firstTwoHitsCrit = false;
                }
            }
            // Turn-based CRIT (3/4 Metronome)
            if (!isDoubleAttack && attacker.critEveryNthTurn && attacker.critEveryNthTurn > 0) {
                attacker._attacksMade = (attacker._attacksMade || 0) + 1;
                if (attacker._attacksMade % attacker.critEveryNthTurn === 0) {
                    attacker._forcedCritNextAttack = true;
                }
            }

            // Aura Stone: holder cannot attack
            if (!isDoubleAttack && attacker.auraStone) {
                log(`${attackerName} cannot attack due to Aura Stone. 🪬`);
                return;
            }
            // Instakill check (on CRIT only) — counts forced crits (e.g., 3/4 Metronome) as CRITs
            {
                const forceCrit = !!attacker._forcedCritNextAttack;
                if (attacker.instakillOnZeroDef && defender.currentDef <= 0 && !defender.immuneToCrits && (forceCrit || Math.random() < attacker.currentCritChance)) {
                    if (forceCrit) attacker._forcedCritNextAttack = false;
                log(`${attackerName}'s Hidden Dagger finds a fatal opening! ${defenderName} is instantly defeated! ☠️`);
                defender.currentHp = 0;
                updateStats(defender, defNum, true);
                checkBattleEnd();
                return;
            }
            }
            // Assassin's Cloak: Instakill effect removed
            // Dodge check
            if (Math.random() < defender.currentDodgeChance && !attacker.noDodgeAttack && !defender.noDodge) {
                log(`${defenderName} dodges the attack! 💨`);
                const fighterEl = document.getElementById(defenderFighterId);
                fighterEl.classList.add('dodge-flash');
                setTimeout(() => fighterEl.classList.remove('dodge-flash'), 300);
                animateHit(defenderFighterId);
                // Laced Fan: apply poison on dodge
                if (defender.poisonOnDodgeAmount && defender.poisonOnDodgeAmount > 0) {
                    if (!(attacker.invulnerableTurnsRemaining && attacker.invulnerableTurnsRemaining > 0)) {
                        attacker.poisoned.push({damage: defender.poisonOnDodgeAmount, turns: 9999});
                        log(`${attackerName} is poisoned by Laced Fan! 🪭`);
                        showFloatingText(attackerFighterId, defender.poisonOnDodgeAmount, 'poison');
                    } else {
                        log(`${attackerName} is invulnerable and resists Laced Fan's poison! 🫧`);
                    }
                }
                if (defender.defDebuffEnemyOnDodgeFlat && defender.defDebuffEnemyOnDodgeFlat > 0) {
                    attacker.currentDef = Math.max(0, attacker.currentDef - defender.defDebuffEnemyOnDodgeFlat);
                    log(`${attackerName} loses ${defender.defDebuffEnemyOnDodgeFlat} DEF on DODGE (Assassin's Cloak)! 🥷🏻`);
                    highlightStat(`def${attNum}`, 'decrease');
                }
                if (defender.atkGainOnDodge > 0) {
                    defender.currentAtk += defender.atkGainOnDodge;
                    log(`${defenderName} gains ${defender.atkGainOnDodge} ATK on DODGE! Current ATK: ${Math.round(defender.currentAtk)} 🗡️`);
                    highlightStat(`atk${defNum}`, 'increase');
                }
                if (defender.regenOnCritOrDodge > 0) {
                    defender.currentHp = Math.min(defender.maxHp, defender.currentHp + defender.regenOnCritOrDodge);
                    log(`${defenderName} <b>regens</b> ${defender.regenOnCritOrDodge} HP on DODGE!`);
                    showFloatingText(defenderFighterId, defender.regenOnCritOrDodge, 'heal');
                }
                // Mystic Band reworked: no CRIT on dodge
                updateStats(defender, defNum, true);
                return;
            }

            let calculatedAttackerAtk = attacker.currentAtk;
            if (attacker.useDefAsAtk) {
                calculatedAttackerAtk = attacker.currentDef;
            }
            // Apply persistent battle ATK multiplier (e.g., Dragonscale Heart overheal)
            if (attacker._battleAtkMultiplier && attacker._battleAtkMultiplier > 1) {
                calculatedAttackerAtk = Math.round(calculatedAttackerAtk * attacker._battleAtkMultiplier);
            }
            // Dynamic ATK from SPD (Windblade and similar): apply each attack based on currentSpd
            if (attacker.scaleAtkPerSpd && attacker.scaleAtkPerSpd > 0) {
                calculatedAttackerAtk += attacker.currentSpd * attacker.scaleAtkPerSpd;
            }
            // Heavy Hammer: dynamic ATK from Max HP during battle
            if (attacker.atkBasedOnMaxHp > 0) {
                calculatedAttackerAtk += attacker.maxHp * attacker.atkBasedOnMaxHp;
            }
            // Berserker Helm: double ATK below threshold
            if (attacker.berserkerThreshold > 0 && attacker.currentHp <= attacker.maxHp * attacker.berserkerThreshold) {
                calculatedAttackerAtk *= 2;
                log(`${attackerName}'s Berserker Helm doubles ATK! 🪖`);
            }

            // Campaign permanent ATK multiplier (applies to base and dynamic gains like Heavy Hammer)
            if (mode === 'campaign' && attNum === 1) {
                const atkMult = (campaignBuffMultipliers && campaignBuffMultipliers.atk) ? campaignBuffMultipliers.atk : 1;
                if (atkMult && atkMult !== 1) {
                    calculatedAttackerAtk *= atkMult;
                }
            }

            // Apply campaign DEF multiplier to defender before armor penetration
            let effectiveDefenderDef = defender.currentDef;
            if (mode === 'campaign' && defNum === 2) {
                const defMult = (campaignBuffMultipliers && campaignBuffMultipliers.def) ? campaignBuffMultipliers.def : 1;
                if (defMult && defMult !== 1) effectiveDefenderDef = Math.round(effectiveDefenderDef * defMult);
            }
            effectiveDefenderDef *= (1 - attacker.armorPenetration);
            let blockedDamage = effectiveDefenderDef * DEF_DAMAGE_BLOCK_PERCENTAGE;
            let rawDamage = Math.max(0, calculatedAttackerAtk - blockedDamage);

            if (attacker.lowHpDamageBonus > 0 && defender.currentHp < defender.maxHp * attacker.lowHpThreshold) {
                rawDamage *= attacker.lowHpDamageBonus;
                log(`${attackerName} deals increased damage to a weakened target!`);
            }

            let isCritical = false;
            let floatingTextClass = 'damage';
            const forceCrit = !!attacker._forcedCritNextAttack;
            if ((forceCrit || Math.random() < attacker.currentCritChance) && !defender.immuneToCrits) {
                rawDamage *= (2 + attacker.critDamageBonus);
                isCritical = true;
                log(`Critical Hit! 💥`);
                floatingTextClass = 'critical';
                if (forceCrit) attacker._forcedCritNextAttack = false;
                // Allow Blade Shoes to be used again on a later attack if not yet exhausted
                attacker._bladeShoesAppliedThisAttack = false;
                if (attacker.regenOnCritOrDodge > 0) {
                    if (attacker.invulnerableTurnsRemaining && attacker.invulnerableTurnsRemaining > 0) {
                        log(`${attackerName} is invulnerable and cannot regen from CRIT. 🫧`);
                    } else {
                        const beforeHeal = attacker.currentHp;
                        const healAmt = attacker.regenOnCritOrDodge;
                        const healedTo = Math.min(attacker.maxHp, beforeHeal + healAmt);
                        const overhealTriggered = beforeHeal + healAmt > attacker.maxHp;
                        attacker.currentHp = healedTo;
                        log(`${attackerName} <b>regens</b> ${healAmt} HP from on CRIT!`);
                        showFloatingText(attackerFighterId, healAmt, 'heal');
                        if (overhealTriggered && attacker.doubleAtkOnOverheal) {
                            const prevMult = attacker._battleAtkMultiplier || 1;
                            const newMult = prevMult * 2;
                            attacker._battleAtkMultiplier = newMult;
                            log(`${attackerName}'s Dragonscale Heart surges: ATK x${newMult} for the rest of the battle! 🫀`);
                        }
                    }
                }
                // Mystic Band reworked: no CRIT on crit
                if (attacker.defSpdRegDoubleNextTurnOnCrit) {
                    attacker._nextTurnRegenMultiplier = Math.max(attacker._nextTurnRegenMultiplier || 0, 2);
                    attacker._nextTurnDefMultiplier = 2;
                    attacker._nextTurnSpdMultiplier = 2;
                    log(`${attackerName}'s Minstrel's Lute empowers next turn: x2 DEF, x2 SPD, x2 REG! 🪕`);
                } else if (attacker.tripleRegenNextTurnOnCrit) {
                    attacker._nextTurnRegenMultiplier = Math.max(attacker._nextTurnRegenMultiplier || 0, 3);
                    log(`${attackerName}'s Minstrel's Lute will triple regen next turn! 🪕`);
                }
                // On-CRIT effects
                if (attacker.burnOnCritDamage > 0) {
                    if (!(defender.invulnerableTurnsRemaining && defender.invulnerableTurnsRemaining > 0)) {
                    defender.burnStacks = (defender.burnStacks || 0) + attacker.burnOnCritDamage;
                    log(`${defenderName} is burned for ${attacker.burnOnCritDamage} per turn! 🔥`);
                    } else {
                        log(`${defenderName} is invulnerable and resists burn! 🫧`);
                    }
                }
                if (attacker.healReductionOnCritPercent > 0) {
                    defender.healReductionPercent = Math.max(defender.healReductionPercent || 0, attacker.healReductionOnCritPercent);
                    defender.healReductionTurns = Math.max(defender.healReductionTurns || 0, 1);
                    log(`${defenderName}'s healing is reduced by ${(attacker.healReductionOnCritPercent*100).toFixed(0)}% for 1 turn! ⛓️`);
                }
            } else if (defender.immuneToCrits && Math.random() < attacker.currentCritChance) {
                log(`${defenderName} is immune to the critical hit!`);
            }

            // Aura Stone: the holder's opponent takes x2 damage
            const auraMult = attacker.auraStone ? 2 : 1;
            rawDamage *= (1 - defender.damageReduction) * auraMult;
            // Imperial Crest: enforce minimum damage dealt by attacker
            const attackerMin = attacker.minDamageDealt || 0;
            let finalDamage = Math.round(Math.max(attackerMin > 0 ? attackerMin : 1, rawDamage));
            // Invulnerability check
            if (defender.invulnerableTurnsRemaining && defender.invulnerableTurnsRemaining > 0) {
                log(`${defenderName} is invulnerable and takes no damage! 🫧`);
                finalDamage = 0;
            } else {
                defender.currentHp -= finalDamage;
                // Mystic Band: if you would die, resist once (stay at 1 HP) and become invulnerable for 1 turn
                if (defender.currentHp <= 0 && defender.deathResistOnce && !defender._deathResistedOnce) {
                    defender.currentHp = 1;
                    defender._deathResistedOnce = true;
                    defender.invulnerableTurnsRemaining = Math.max(defender.invulnerableTurnsRemaining || 0, 1);
                    const fighter = document.getElementById(`fighter${defNum}`);
                    if (fighter) {
                        fighter.classList.add('invulnerable-glow');
                        fighter.style.borderWidth = '2px';
                    }
                    log(`${defenderName}'s Mystic Band shines! Resists death and becomes invulnerable for 1 turn. ✨`);
                }
            }
            log(`${attackerName} attacks ${defenderName} for <span class="font-bold text-red-700 dark:text-red-400">${finalDamage}</span> damage${isCritical ? ' (CRIT!)' : ''} 💥`);
            animateHit(defenderFighterId);
            showFloatingText(defenderFighterId, finalDamage, floatingTextClass);

            // Revival Charm logic
            if (defender.reviveThreshold > 0 && !defender.hasRevived && defender.currentHp > 0 && defender.currentHp <= defender.reviveThreshold) {
                if (defender.invulnerableTurnsRemaining && defender.invulnerableTurnsRemaining > 0) {
                    log(`${defenderName} is invulnerable and Revival Charm's heal is suppressed this turn. 🫧`);
                } else {
                let healAmount = defender.reviveHeal;
                if (defender.healReductionPercent > 0) healAmount = Math.round(healAmount * (1 - defender.healReductionPercent));
                    const beforeHeal = defender.currentHp;
                    const healedTo = Math.min(defender.maxHp, defender.currentHp + healAmount);
                    const overhealTriggered = beforeHeal + healAmount > defender.maxHp;
                    defender.currentHp = healedTo;
                defender.hasRevived = true;
                log(`${defenderName} is saved by Revival Charm and heals for ${healAmount} HP! 💗`);
                showFloatingText(defenderFighterId, healAmount, 'heal');
                    if (overhealTriggered && defender.doubleAtkOnOverheal) {
                        const prevMult = defender._battleAtkMultiplier || 1;
                        const newMult = prevMult * 2;
                        defender._battleAtkMultiplier = newMult;
                        log(`${defenderName}'s Dragonscale Heart surges: ATK x${newMult} for the rest of the battle! 🫀`);
                    }
                }
            }
            updateStats(defender, defNum, true);

            if (finalDamage > 0) {
                // Combo Finisher: count damage events this turn for the attacker
                attacker._comboDamageEventsThisTurn = (attacker._comboDamageEventsThisTurn || 0) + 1;
                if (attacker.comboFinisher && attacker._comboDamageEventsThisTurn === 4) {
                    // Apply 20% max HP damage to the defender once when threshold reached
                    const bonus = Math.round(defender.maxHp * 0.20);
                    defender.currentHp = Math.max(0, defender.currentHp - bonus);
                    log(`${attackerName}'s Combo Finisher triggers! Enemy loses ${bonus} HP (20% Max HP). 💫`);
                    showFloatingText(defenderFighterId, bonus, 'damage');
                }
                // Track lost HP for Lost Charm at defender side
                defender._lostHpLastTurn = (defender._lostHpLastTurn || 0) + finalDamage;
                // Soulblood Ampule logic
                if (defender.soulbloodThreshold > 0 && finalDamage > defender.soulbloodThreshold) {
                    defender.currentDef += defender.soulbloodDefGain;
                    log(`${defenderName} gains ${defender.soulbloodDefGain} DEF from Soulblood Ampule!`);
                    highlightStat(`def${defNum}`, 'increase');
                }
                // Serene Mala: increase Max HP by a percentage of damage (no heal)
                if (defender.sereneMalaPercent > 0 && finalDamage > 0) {
                    const gain = Math.round(finalDamage * defender.sereneMalaPercent);
                    defender.maxHp += gain;
                    log(`${defenderName}'s Serene Mala grants +${gain} Max HP from damage taken. 📿`);
                    updateStats(defender, defNum, true);
                }
                // Other Post-hit effects
                if (defender.spdDebuffOnHit > 0) {
                    attacker.currentSpd -= defender.spdDebuffOnHit;
                    log(`${defenderName}'s Ice Bulwark chills ${attackerName}, reducing SPD by ${defender.spdDebuffOnHit}! 🧊`);
                    highlightStat(`spd${attNum}`, 'decrease');
                }
                // Molten Armor: apply burn to both on taking a hit
                if (defender.burnBothOnHitAmount > 0) {
                    attacker.burnStacks = (attacker.burnStacks || 0) + defender.burnBothOnHitAmount;
                    defender.burnStacks = (defender.burnStacks || 0) + defender.burnBothOnHitAmount;
                    log(`Molten Armor sears both combatants for ${defender.burnBothOnHitAmount} burn! 🌋`);
                }
                // (Serene Mala handled above; no healing is applied)
                
                if (defender.atkGainOnDamageTaken > 0) {
                    defender.currentAtk += defender.atkGainOnDamageTaken;
                    log(`${defenderName} gains ${defender.atkGainOnDamageTaken} ATK!`);
                    highlightStat(`atk${defNum}`, 'increase');
                }
                // Living Carapace: stack regen when hit
                if (defender.regenStackOnHit > 0) {
                    defender._bonusRegenFromHits = (defender._bonusRegenFromHits || 0) + defender.regenStackOnHit;
                    log(`${defenderName}'s Living Carapace hardens: +${defender.regenStackOnHit} REG (stacks). 🐞`);
                }
                if (attacker.lifesteal > 0) {
                    if (attacker.invulnerableTurnsRemaining && attacker.invulnerableTurnsRemaining > 0) {
                        log(`${attackerName} is invulnerable and cannot lifesteal this turn. 🫧`);
                    } else {
                    let lifestealAmount = Math.round(finalDamage * attacker.lifesteal);
                    if (attacker.healReductionPercent > 0) lifestealAmount = Math.round(lifestealAmount * (1 - attacker.healReductionPercent));
                        const beforeHeal = attacker.currentHp;
                        const healedTo = Math.min(attacker.maxHp, attacker.currentHp + lifestealAmount);
                        const overhealTriggered = beforeHeal + lifestealAmount > attacker.maxHp;
                        attacker.currentHp = healedTo;
                    log(`${attackerName} lifesteals ${lifestealAmount} HP. 🩸`);
                    showFloatingText(attackerFighterId, lifestealAmount, 'heal');
                        if (overhealTriggered && attacker.doubleAtkOnOverheal) {
                            const prevMult = attacker._battleAtkMultiplier || 1;
                            const newMult = prevMult * 2;
                            attacker._battleAtkMultiplier = newMult;
                            log(`${attackerName}'s Dragonscale Heart surges: ATK x${newMult} for the rest of the battle! 🫀`);
                        }
                    }
                }
                updateStats(attacker, attNum, true);
                updateStats(defender, defNum, true);
                
                if (checkBattleEnd()) return;
                // Delayed effects
                if (defender.thornsDamage > 0 && !attacker.immuneToThorns) {
                    await sleep(500);
                    const thornsAuraMult = defender.auraStone ? 2 : 1;
                    const thornsDamage = Math.round(defender.thornsDamage * (1 - attacker.damageReduction) * thornsAuraMult);
                    if (!(attacker.invulnerableTurnsRemaining && attacker.invulnerableTurnsRemaining > 0)) {
                        attacker.currentHp -= thornsDamage;
                        // Combo Finisher: count thorns against defender (who caused the hit)
                        if (defender && defender.comboFinisher && thornsDamage > 0) {
                            defender._comboDamageEventsThisTurn = (defender._comboDamageEventsThisTurn || 0) + 1;
                            if (defender._comboDamageEventsThisTurn === 4) {
                                const bonus = Math.round(attacker.maxHp * 0.20);
                                attacker.currentHp = Math.max(0, attacker.currentHp - bonus);
                                log(`${defenderName}'s Combo Finisher triggers from thorns! Enemy loses ${bonus} HP (20% Max HP). 💫`);
                                showFloatingText(attackerFighterId, bonus, 'damage');
                            }
                        }
                        log(`${attackerName} takes ${thornsDamage} thorns damage. 🌵`);
                        showFloatingText(attackerFighterId, thornsDamage, 'thorns');
                    } else {
                        log(`${attackerName} is invulnerable and ignores thorns! 🫧`);
                    }
                    updateStats(attacker, attNum, true);
                    if (checkBattleEnd()) return;
                }
                if (defender.reflectBlockedDamage > 0 && !attacker.immuneToReflect) {
                    await sleep(500);
                    let reflectedDmg = Math.round(blockedDamage * defender.reflectBlockedDamage);
                    const reflectAuraMult = defender.auraStone ? 2 : 1;
                    reflectedDmg = Math.round(reflectedDmg * (1 - attacker.damageReduction) * reflectAuraMult);
                    if (reflectedDmg > 0) {
                        if (!(attacker.invulnerableTurnsRemaining && attacker.invulnerableTurnsRemaining > 0)) {
                            attacker.currentHp -= reflectedDmg;
                            // Combo Finisher: count reflect against defender (who reflected)
                            if (defender && defender.comboFinisher && reflectedDmg > 0) {
                                defender._comboDamageEventsThisTurn = (defender._comboDamageEventsThisTurn || 0) + 1;
                                if (defender._comboDamageEventsThisTurn === 4) {
                                    const bonus = Math.round(attacker.maxHp * 0.20);
                                    attacker.currentHp = Math.max(0, attacker.currentHp - bonus);
                                    log(`${defenderName}'s Combo Finisher triggers from reflect! Enemy loses ${bonus} HP (20% Max HP). 💫`);
                                    showFloatingText(attackerFighterId, bonus, 'damage');
                                }
                            }
                            log(`${attackerName} takes ${reflectedDmg} reflected damage. 🪞`);
                            showFloatingText(attackerFighterId, reflectedDmg, 'thorns');
                        } else {
                            log(`${attackerName} is invulnerable and ignores reflect! 🫧`);
                        }
                        updateStats(attacker, attNum, true);
                        if (checkBattleEnd()) return;
                    }
                }
                
                // Status effects
                if (attacker.poisonOnHit) {
                    if (!(defender.invulnerableTurnsRemaining && defender.invulnerableTurnsRemaining > 0)) {
                    defender.poisoned.push({damage: attacker.poisonDmgPerTurn, turns: attacker.poisonTurns || 9999});
                    log(`${defenderName} is poisoned! 🤢`);
                    } else {
                        log(`${defenderName} is invulnerable and resists poison! 🫧`);
                }
                }
                // Apply heal reduction on HIT (Soulbind Chains)
                if (attacker.healReductionOnHitPercent > 0) {
                    defender.healReductionPercent = Math.max(defender.healReductionPercent || 0, attacker.healReductionOnHitPercent);
                    defender.healReductionTurns = Math.max(defender.healReductionTurns || 0, 1);
                    log(`${defenderName}'s healing is reduced by ${(attacker.healReductionOnHitPercent*100).toFixed(0)}% for 1 turn! ⛓️`);
                }
                // Antibodies healing occurs during poison tick phase only
                // D20: small chance to deal massive damage on a successful hit
                if (attacker.deathDieChance > 0 && Math.random() < attacker.deathDieChance) {
                    if (!(defender.invulnerableTurnsRemaining && defender.invulnerableTurnsRemaining > 0)) {
                        defender.currentHp = Math.max(0, defender.currentHp - attacker.deathDieDamage);
                        log(`${attackerName}'s D20 triggers! -${attacker.deathDieDamage} HP to ${defenderName}! 🎲`);
                        const defEl = document.getElementById(defenderFighterId);
                        if (defEl) {
                            defEl.classList.add('mega-hit', 'mega-flash');
                            setTimeout(() => defEl.classList.remove('mega-hit', 'mega-flash'), 600);
                        }
                        showFloatingText(defenderFighterId, attacker.deathDieDamage, 'mega');
                        updateStats(defender, defNum, true);
                        if (checkBattleEnd()) return;
                    } else {
                        log(`${defenderName} is invulnerable and ignores D20 effect! 🫧`);
                    }
                }
                if (!isDoubleAttack && Number(attacker.randomDebuffOnHitAmount) > 0) {
                    const choices = ['atk', 'def', 'spd'];
                    const debuffType = choices[Math.floor(Math.random()*choices.length)];
                    const amount = Number(attacker.randomDebuffOnHitAmount) || 0;
                    if (amount > 0) {
                        if (defender.debuffReflectChance > 0 && Math.random() < defender.debuffReflectChance) {
                            if (debuffType === 'atk') attacker.currentAtk = Math.max(0, attacker.currentAtk - amount);
                            if (debuffType === 'def') attacker.currentDef = Math.max(0, attacker.currentDef - amount);
                            if (debuffType === 'spd') attacker.currentSpd = Math.max(0, attacker.currentSpd - amount);
                            log(`${defenderName}'s Warding Eye reflects debuff: -${amount} ${debuffType.toUpperCase()} back to ${attackerName}! 🧿`);
                            // Visual red box highlight on reflected stat
                            if (debuffType === 'atk') highlightStat(`atk${attNum}`, 'decrease');
                            if (debuffType === 'def') highlightStat(`def${attNum}`, 'decrease');
                            if (debuffType === 'spd') highlightStat(`spd${attNum}`, 'decrease');
                            updateStats(attacker, attNum, true);
                        } else {
                            if (debuffType === 'atk') defender.currentAtk = Math.max(0, defender.currentAtk - amount);
                            if (debuffType === 'def') defender.currentDef = Math.max(0, defender.currentDef - amount);
                            if (debuffType === 'spd') defender.currentSpd = Math.max(0, defender.currentSpd - amount);
                            log(`${attackerName}'s Arcanist's Wand inflicts -${amount} ${debuffType.toUpperCase()}! 🪄`);
                            // Visual red box highlight on target stat
                            if (debuffType === 'atk') highlightStat(`atk${defNum}`, 'decrease');
                            if (debuffType === 'def') highlightStat(`def${defNum}`, 'decrease');
                            if (debuffType === 'spd') highlightStat(`spd${defNum}`, 'decrease');
                            updateStats(defender, defNum, true);
                        }
                    }
                }
            if (attacker.reduceMaxHpOnHitPercent > 0) {
                const reduceAmt = Math.round(defender.maxHp * attacker.reduceMaxHpOnHitPercent);
                if (reduceAmt > 0) {
                    defender.maxHp = Math.max(1, defender.maxHp - reduceAmt);
                    defender.currentHp = Math.min(defender.currentHp, defender.maxHp);
                    log(`${defenderName}'s MAX HP is reduced by ${Math.round(attacker.reduceMaxHpOnHitPercent*100)}%! 🦴`);
                    updateStats(defender, defNum, true);
                }
            }
                if (attacker.stunChance > 0 && Math.random() < attacker.stunChance) {
                    defender.stunnedTurns = 1;
                    log(`${defenderName} is stunned! ⚡`);
                }
                // Floating Balloon: On first successful hit that deals damage, pop -> convert owner's DODGE% to flat +ATK, remove item, set owner's DODGE to 0%
                if (defender.balloonPopOnHit && finalDamage > 0) {
                    // Pop only once: remove from inventory immediately
                    defender.inv = (defender.inv || []).filter(it => it.name !== 'Floating Balloon');
                    const dodgePctToAtk = Math.round((defender.currentDodgeChance || 0) * 100);
                    if (dodgePctToAtk > 0) {
                        defender.currentAtk += dodgePctToAtk;
                        log(`${defenderName}'s Floating Balloon pops and converts ${dodgePctToAtk}% DODGE to +${dodgePctToAtk} ATK! 🎈`);
                        highlightStat(`atk${defNum}`, 'increase');
                    } else {
                        log(`${defenderName}'s Floating Balloon pops! 🎈`);
                    }
                    defender.currentDodgeChance = 0;
                    defender.dodgeChance = 0;
                    updateStats(defender, defNum, true);
                }
                // Jelly Mantle conditional stun on taking small damage
                if (defender.stunAttackerOnDamageChance > 0 && finalDamage > 0) {
                    const threshold = defender.onlyStunIfDamageBelow || Infinity;
                    if (finalDamage < threshold && Math.random() < defender.stunAttackerOnDamageChance) {
                        attacker.stunnedTurns = 1;
                        log(`${attackerName} is stunned by Jelly Mantle! 🪼`);
                    }
                }
                // Spectral Bow: if attacker stunned the defender (from any source this attack) and has Bow, force next crit
                if (attacker.nextCritAfterStun && defender.stunnedTurns > 0) {
                    attacker._forcedCritNextAttack = true;
                    log(`${attackerName}'s Spectral Bow readies a guaranteed CRIT next attack! 🏹`);
                }
                // Reflectible stat debuffs (Warding Eye)
                if (attacker.defDebuffOnHit > 0) {
                    if (defender.debuffReflectChance > 0 && Math.random() < defender.debuffReflectChance) {
                        attacker.currentDef = Math.max(0, attacker.currentDef * (1 - attacker.defDebuffOnHit));
                        log(`${defenderName}'s Warding Eye reflects debuff: DEF reduced on ${attackerName}! 🧿`);
                        highlightStat(`def${attNum}`, 'decrease');
                        updateStats(attacker, attNum, true);
                    } else {
                        defender.currentDef = Math.max(0, defender.currentDef * (1 - attacker.defDebuffOnHit));
                        log(`${attackerName} reduces ${defenderName}'s DEF! 🍃`);
                        highlightStat(`def${defNum}`, 'decrease');
                        updateStats(defender, defNum, true);
                    }
                }
                if (attacker.defFlatDebuffOnHit > 0) {
                    if (defender.debuffReflectChance > 0 && Math.random() < defender.debuffReflectChance) {
                        attacker.currentDef = Math.max(0, attacker.currentDef - attacker.defFlatDebuffOnHit);
                        log(`${defenderName}'s Warding Eye reflects debuff: -${attacker.defFlatDebuffOnHit} DEF to ${attackerName}! 🧿`);
                        highlightStat(`def${attNum}`, 'decrease');
                        updateStats(attacker, attNum, true);
                    } else {
                        defender.currentDef = Math.max(0, defender.currentDef - attacker.defFlatDebuffOnHit);
                        log(`${attackerName} shreds ${defenderName}'s DEF by ${attacker.defFlatDebuffOnHit}! 🍃`);
                        highlightStat(`def${defNum}`, 'decrease');
                        updateStats(defender, defNum, true);
                    }
                }
                if (attacker.atkDebuffOnHit > 0) {
                    if (defender.debuffReflectChance > 0 && Math.random() < defender.debuffReflectChance) {
                        attacker.currentAtk = Math.max(0, attacker.currentAtk * (1 - attacker.atkDebuffOnHit));
                        log(`${defenderName}'s Warding Eye reflects debuff: ATK reduced on ${attackerName}! 🧿`);
                        highlightStat(`atk${attNum}`, 'decrease');
                        updateStats(attacker, attNum, true);
                    } else {
                        defender.currentAtk = Math.max(0, defender.currentAtk * (1 - attacker.atkDebuffOnHit));
                        log(`${attackerName} reduces ${defenderName}'s ATK! ❄️`);
                        highlightStat(`atk${defNum}`, 'decrease');
                        updateStats(defender, defNum, true);
                    }
                }
            if (attacker.spdDebuffNextTurnOnHit > 0) {
                if (defender.debuffReflectChance > 0 && Math.random() < defender.debuffReflectChance) {
                    attacker.nextTurnSpdDebuff = Math.max(attacker.nextTurnSpdDebuff || 0, attacker.spdDebuffNextTurnOnHit);
                    log(`${defenderName}'s Warding Eye reflects debuff: ${attackerName} will lose ${attacker.spdDebuffNextTurnOnHit} SPD next turn! 🧿`);
                } else {
                    defender.nextTurnSpdDebuff = Math.max(defender.nextTurnSpdDebuff || 0, attacker.spdDebuffNextTurnOnHit);
                    log(`${defenderName} will lose ${attacker.spdDebuffNextTurnOnHit} SPD next turn! 🕸️`);
                }
            }
            if (attacker.dodgeDebuffNextTurnOnHit > 0) {
                if (defender.debuffReflectChance > 0 && Math.random() < defender.debuffReflectChance) {
                    attacker.nextTurnDodgeDebuff = Math.max(attacker.nextTurnDodgeDebuff || 0, attacker.dodgeDebuffNextTurnOnHit);
                    log(`${defenderName}'s Warding Eye reflects debuff: ${attackerName} will lose ${(attacker.dodgeDebuffNextTurnOnHit*100).toFixed(0)}% DODGE next turn! 🧿`);
                } else {
                    defender.nextTurnDodgeDebuff = Math.max(defender.nextTurnDodgeDebuff || 0, attacker.dodgeDebuffNextTurnOnHit);
                    log(`${defenderName} will lose ${(attacker.dodgeDebuffNextTurnOnHit*100).toFixed(0)}% DODGE next turn! 🕸️`);
                }
            }
            
            updateStats(attacker, attNum, true);
            updateStats(defender, defNum, true);

            // Multi-attack Logic with Delay
            // Base: can double attack if has chance (cap 3 extras total normally)
            let remainingExtraAttacks = 0;
            if (!isDoubleAttack && attacker.doubleAttackChance > 0 && Math.random() < attacker.doubleAttackChance) {
                remainingExtraAttacks = 1;
            }
            // Dual Daggers extension: if speed lead is sufficient, allow up to 3 total extras (4 total hits)
            if (!isDoubleAttack && attacker.quadAttackIfSpdLead > 0) {
                const spdLead = attacker.currentSpd - defender.currentSpd;
                if (spdLead >= attacker.quadAttackIfSpdLead) {
                    remainingExtraAttacks = Math.max(remainingExtraAttacks, 3);
                }
            }
            // Rocket Salvo: override cap to 4 extras on turn 1 (total 5)
            if (!isDoubleAttack && attacker.rocketSalvoFirstTurn && turnCounter === 1 && !attacker._rocketAppliedThisTurn) {
                remainingExtraAttacks = Math.max(remainingExtraAttacks, 4);
                attacker._rocketAppliedThisTurn = true;
            }
            while (remainingExtraAttacks > 0 && defender.currentHp > 0 && attacker.currentHp > 0) {
                log(`${attackerName} strikes again!`);
                await sleep(500);
                await executeAttack(attacker, defender, attNum, defNum, true);
                remainingExtraAttacks--;
            }

            // Invulnerability countdown handled once per full turn (outside this attack loop)
            }

        }

        function resetGame() {
            clearInterval(battleInterval);
            turnCounter = 0;
            log('<p class="text-xl font-bold text-center text-gray-800 dark:text-gray-100 my-2">🔄 Game Reset! 🔄</p>');
            document.getElementById('log').innerHTML = '<p class="text-gray-500 italic">Battle log will appear here...</p>';

            initializePlayers();
            renderItems(); // Re-render to clear selections
            updateStats(p1, 1);
            updateStats(p2, 2);

            document.getElementById('fighter1').classList.remove('loser-tint', 'poison-tint');
            document.getElementById('fighter2').classList.remove('loser-tint', 'poison-tint');
            const f1ov = document.getElementById('f1LoserOverlay'); if (f1ov) f1ov.remove();
            const f2ov = document.getElementById('f2LoserOverlay'); if (f2ov) f2ov.remove();

            document.querySelectorAll('#items button').forEach(btn => btn.disabled = false);
            const sb2 = document.getElementById('startButton');
            if (sb2) { sb2.disabled = false; sb2.style.display = 'inline-block'; }
            document.getElementById('randomize1').style.display = 'inline-block';
            document.getElementById('randomize2').style.display = 'inline-block';
            document.getElementById('presets1').style.display = 'inline-block';
            document.getElementById('presets2').style.display = 'inline-block';
            document.getElementById('rematchButton').style.display = 'none';
            const nextBtn = document.getElementById('nextFloorButton');
            if (nextBtn) nextBtn.style.display = 'none';
            const fightBtn = document.getElementById('fightButton');
            if (fightBtn) fightBtn.disabled = false;
            initModeSelection();
        }
        function rematch() {
            log('<p class="text-xl font-bold text-center text-gray-800 dark:text-gray-100 my-2">⚔️ Rematch with Same Items! ⚔️</p>');
            
            // Reset battle state but keep items
            turnCounter = 0;
            clearInterval(battleInterval);
            
            // Reset player HP and status effects
            p1.currentHp = p1.maxHp;
            p2.currentHp = p2.maxHp;
            p1.poisoned = [];
            p2.poisoned = [];
            p1.stunnedTurns = 0;
            p2.stunnedTurns = 0;
            p1.hasRevived = false;
            p2.hasRevived = false;
            
            // Update UI
            updateStats(p1, 1);
            updateStats(p2, 2);
            
            // Remove visual effects
            document.getElementById('fighter1').classList.remove('loser-tint', 'poison-tint');
            document.getElementById('fighter2').classList.remove('loser-tint', 'poison-tint');
            const f1ov2 = document.getElementById('f1LoserOverlay'); if (f1ov2) f1ov2.remove();
            const f2ov2 = document.getElementById('f2LoserOverlay'); if (f2ov2) f2ov2.remove();
            
            // Hide post-battle buttons
            document.getElementById('rematchButton').style.display = 'none';
            
            // Start new battle
            startBattle();
        }
        // Make functions globally accessible
        window.openPresetsModal = openPresetsModal;
        window.randomizeItems = randomizeItems;
        window.startBattle = startBattle;
        window.resetGame = resetGame;
        window.rematch = rematch;
        window.startCampaign = startCampaign;
        window.startPVP = startPVP;
        window.startFight = startFight;
        window.nextFloor = nextFloor;

        try {
        initializePlayers();
        initModeSelection();
        tagItemsByCurrentPosition();
        renderItems();
        updateStats(p1, 1);
        updateStats(p2, 2);
        } catch (e) {
            const logDiv = document.getElementById('log');
            if (logDiv) {
                logDiv.innerHTML += `<p class="mb-1 text-red-600 dark:text-red-400"><b>Init Error:</b> ${e.message || e}</p>`;
                logDiv.scrollTop = logDiv.scrollHeight;
            }
            console.error('Initialization failed:', e);
        }
        // Item search hover/typing behavior
        (function setupItemSearch() {
            const label = document.getElementById('itemSearchLabel');
            const input = document.getElementById('itemSearchInput');
            if (!label || !input) return;
            const showInput = () => { label.classList.add('hidden'); input.classList.remove('hidden'); input.focus(); };
            const hideInputIfEmpty = () => { if (!input.value.trim()) { input.classList.add('hidden'); label.classList.remove('hidden'); } };
            label.addEventListener('mouseenter', showInput);
            label.addEventListener('click', showInput);
            input.addEventListener('blur', hideInputIfEmpty);
            input.addEventListener('input', () => { renderItems(); });
            // Esc clears and hides
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') { input.value = ''; renderItems(); input.blur(); }
            });
        })();
    </script>
